stages:
  - build

build-docker-image:
  stage: build
  image: docker:cli
  services:
    - docker:dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""

  before_script:
    - apk add --no-cache curl
    - until docker info > /dev/null 2>&1; do echo "waiting for dockerd..."; sleep 1; done
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

  script:
    - docker build --provenance=false -t "$CI_REGISTRY_IMAGE:latest" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .

    - docker push "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

    - |
      cat <<EOF > webhook_payload.json
      {
        "project_name": "$CI_PROJECT_NAME",
        "commit_sha": "$CI_COMMIT_SHORT_SHA",
        "branch": "$CI_COMMIT_BRANCH",
        "registry_image": "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA",
        "status": "build_success"
      }
      EOF

    - >
      curl -X POST https://apigw.paziresh24.com/v1/n8n-search/webhook/p24-gitlab-update-webhook
      -H "Content-Type: application/json"
      -d @webhook_payload.json

  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always